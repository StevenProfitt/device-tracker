<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Device Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #e8eef5;
    --border: #d0dae6;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --text: #1e293b;
    --text-muted: #64748b;
    --text-light: #94a3b8;
    --success: #16a34a;
    --danger: #dc2626;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 1.25rem 1rem calc(1.5rem + var(--safe-bottom));
    -webkit-text-size-adjust: 100%;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  header h1 { font-family: var(--sans); font-size: 1.15rem; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
  header h1 span { color: var(--accent); }

  .rec-badge {
    font-family: var(--mono); font-size: 0.7rem; color: var(--text-muted);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 0.2rem 0.7rem;
  }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem; box-shadow: var(--shadow);
  }

  .section-label {
    font-size: 0.65rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-light);
    margin-bottom: 0.85rem; display: flex; align-items: center; gap: 0.5rem;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .field { margin-bottom: 1rem; }
  .field:last-child { margin-bottom: 0; }

  .field label {
    display: block; font-size: 0.72rem; font-weight: 600;
    letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.4rem;
  }

  .input-wrap { display: flex; gap: 0.5rem; align-items: stretch; }

  .field input, .field textarea {
    width: 100%; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: var(--mono);
    font-size: 16px; padding: 0.65rem 0.75rem; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    appearance: none; -webkit-appearance: none; flex: 1;
  }

  .field input:focus, .field textarea:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); background: #fff;
  }

  .field input::placeholder, .field textarea::placeholder { color: var(--text-light); }

  .field textarea { resize: none; min-height: 90px; font-family: var(--sans); line-height: 1.5; }

  .scan-btn {
    background: var(--accent-light); border: 1.5px solid #bfdbfe;
    border-radius: 8px; color: var(--accent); width: 46px; min-height: 46px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; font-size: 1.15rem; padding: 0;
    appearance: none; -webkit-appearance: none;
  }
  .scan-btn:active { background: #dbeafe; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

  .btn-row { display: flex; gap: 0.75rem; margin-top: 1.1rem; }

  button {
    font-family: var(--sans); font-size: 0.9rem; font-weight: 600;
    border: none; border-radius: 8px; padding: 0.75rem 1.2rem;
    min-height: 46px; cursor: pointer; transition: all 0.15s; -webkit-appearance: none;
  }
  button:active { opacity: 0.8; transform: scale(0.98); }
  .btn-primary { background: var(--accent); color: #fff; flex: 1; box-shadow: 0 2px 8px rgba(37,99,235,0.25); }
  .btn-secondary { background: var(--surface); color: var(--text-muted); border: 1.5px solid var(--border); }

  /* ── Scanner Modal ── */
  #scanner-modal {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: #000; flex-direction: column;
  }
  #scanner-modal.open { display: flex; }

  #scanner-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(0.9rem + env(safe-area-inset-top,0px)) 1rem 0.9rem;
    background: rgba(0,0,0,0.7); flex-shrink: 0; z-index: 2;
  }

  #scanner-title { font-weight: 600; font-size: 0.9rem; color: #fff; }

  #scanner-close {
    background: rgba(255,255,255,0.2); border: none; color: #fff;
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1rem; font-weight: 600;
    min-height: unset; padding: 0;
  }

  #interactive {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  /* Quagga injects a <video> and <canvas> here */
  #interactive video {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover !important;
    position: absolute;
    top: 0; left: 0;
  }

  #interactive canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100% !important;
    height: 100% !important;
  }

  /* Targeting overlay */
  .scan-region {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 78%; max-width: 340px;
    aspect-ratio: 3/1;
    pointer-events: none;
    z-index: 3;
  }

  .scan-region::before, .scan-region::after,
  .scan-region .c-br, .scan-region .c-bl {
    content: ''; position: absolute;
    width: 22px; height: 22px; border-color: #fff; border-style: solid;
  }
  .scan-region::before { top:0; left:0; border-width:2.5px 0 0 2.5px; border-radius:2px 0 0 0; }
  .scan-region::after  { top:0; right:0; border-width:2.5px 2.5px 0 0; border-radius:0 2px 0 0; }
  .scan-region .c-br   { bottom:0; right:0; border-width:0 2.5px 2.5px 0; border-radius:0 0 2px 0; }
  .scan-region .c-bl   { bottom:0; left:0; border-width:0 0 2.5px 2.5px; border-radius:0 0 0 2px; }

  .scan-line {
    position: absolute; left: 4px; right: 4px; height: 2px;
    background: linear-gradient(90deg, transparent, #2563eb, transparent);
    animation: scanline 2s ease-in-out infinite; top: 50%; border-radius: 2px;
  }

  @keyframes scanline {
    0%   { transform: translateY(-18px); opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(18px); opacity: 0; }
  }

  #scanner-footer {
    padding: 0.85rem 1.5rem calc(0.85rem + var(--safe-bottom));
    background: rgba(0,0,0,0.7); text-align: center; flex-shrink: 0;
  }

  #scanner-status { font-size: 0.8rem; color: rgba(255,255,255,0.75); font-weight: 500; }
  #scanner-err { font-size: 0.75rem; color: #fca5a5; margin-top: 0.3rem; min-height: 1em; }

  /* Toast */
  #toast {
    position: fixed; bottom: calc(1.5rem + var(--safe-bottom)); left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--success); color: #fff; font-weight: 600; font-size: 0.82rem;
    padding: 0.65rem 1.3rem; border-radius: 20px; opacity: 0;
    transition: all 0.22s ease; pointer-events: none; white-space: nowrap;
    z-index: 1999; box-shadow: 0 4px 12px rgba(22,163,74,0.3);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Records */
  .records-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.85rem; }
  .records-header h2 { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); }
  .btn-export { font-size: 0.78rem; padding: 0.4rem 0.9rem; min-height: 34px; color: var(--accent); border: 1.5px solid #bfdbfe; background: var(--accent-light); }

  .record-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; position: relative; box-shadow: var(--shadow); }
  .record-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.25rem; padding-right: 2.2rem; }
  .record-device { font-size: 0.95rem; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .record-time { font-family: var(--mono); font-size: 0.62rem; color: var(--text-light); display: block; margin-bottom: 0.6rem; }
  .record-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem 1rem; background: var(--bg); border-radius: 8px; padding: 0.6rem 0.75rem; }
  .record-item .lbl { font-size: 0.58rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-light); }
  .record-item .val { font-family: var(--mono); font-size: 0.78rem; color: var(--text); word-break: break-all; }
  .record-notes { margin-top: 0.65rem; padding-top: 0.65rem; border-top: 1px solid var(--border); font-size: 0.82rem; color: var(--text-muted); line-height: 1.5; }
  .record-notes .lbl { font-size: 0.58rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-light); display: block; margin-bottom: 0.2rem; }
  .delete-btn { position: absolute; top: 0.6rem; right: 0.6rem; background: transparent; border: none; color: var(--text-light); font-size: 1rem; cursor: pointer; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 6px; min-height: unset; padding: 0; }
  .delete-btn:active { color: var(--danger); background: #fef2f2; }
  .empty { text-align: center; font-size: 0.82rem; color: var(--text-light); padding: 2.5rem 1rem; line-height: 2; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); }
</style>
</head>
<body>

<header>
  <h1>Device <span>Tracker</span></h1>
  <span class="rec-badge" id="rec-count">0 records</span>
</header>

<div class="card">
  <div class="section-label">Device Info</div>

  <div class="field">
    <label>Device Name</label>
    <input type="text" id="device-name" placeholder="e.g. AP-Floor2-NE"
      autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
  </div>

  <div class="row">
    <div class="field">
      <label>MAC Address</label>
      <div class="input-wrap">
        <input type="text" id="mac" placeholder="AA:BB:CC:DD:EE:FF"
          autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
        <button class="scan-btn" onclick="openScanner('mac')">📷</button>
      </div>
    </div>
    <div class="field">
      <label>Serial Number</label>
      <div class="input-wrap">
        <input type="text" id="serial" placeholder="SN-00123456"
          autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
        <button class="scan-btn" onclick="openScanner('serial')">📷</button>
      </div>
    </div>
  </div>

  <div class="section-label" style="margin-top:0.25rem">Switch</div>

  <div class="row">
    <div class="field">
      <label>Switch Name</label>
      <input type="text" id="switch-name" placeholder="SW-Core-01"
        autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
    </div>
    <div class="field">
      <label>Switch Port</label>
      <input type="text" id="switch-port" placeholder="Gi1/0/24"
        autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
    </div>
  </div>

  <div class="section-label" style="margin-top:0.25rem">Network</div>

  <div class="field">
    <label>VLAN</label>
    <input type="text" id="vlan" placeholder="e.g. 10" inputmode="numeric"
      autocomplete="off" autocorrect="off">
  </div>

  <div class="section-label" style="margin-top:0.25rem">Notes</div>

  <div class="field">
    <label>Close Out Notes</label>
    <textarea id="notes" placeholder="Enter any close out notes, issues, or follow-ups..."></textarea>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="saveRecord()">Save Record</button>
    <button class="btn-secondary" onclick="clearForm()">Clear</button>
  </div>
</div>

<div id="records-section">
  <div class="records-header">
    <h2>Saved Records</h2>
    <button class="btn-secondary btn-export" onclick="exportCSV()">Export CSV</button>
  </div>
  <div id="records-list"></div>
</div>

<div id="toast"></div>

<!-- Scanner Modal -->
<div id="scanner-modal">
  <div id="scanner-header">
    <span id="scanner-title">Scan Barcode</span>
    <button id="scanner-close" onclick="closeScanner()">✕</button>
  </div>
  <div id="interactive">
    <div class="scan-region">
      <div class="c-br"></div>
      <div class="c-bl"></div>
      <div class="scan-line"></div>
    </div>
  </div>
  <div id="scanner-footer">
    <div id="scanner-status">Starting camera…</div>
    <div id="scanner-err"></div>
  </div>
</div>

<script>
  let records = JSON.parse(localStorage.getItem('device-tracker-records') || '[]');
  let scanTarget = null;
  let scannerRunning = false;
  let lastResult = '';
  let resultCooldown = false;

  function val(id) { return document.getElementById(id).value.trim(); }

  function saveRecord() {
    const record = {
      id: Date.now(),
      timestamp: new Date().toLocaleString(),
      deviceName: val('device-name'),
      mac: val('mac'),
      serial: val('serial'),
      switchName: val('switch-name'),
      switchPort: val('switch-port'),
      vlan: val('vlan'),
      notes: val('notes'),
    };
    records.unshift(record);
    localStorage.setItem('device-tracker-records', JSON.stringify(records));
    renderRecords();
    clearForm();
    showToast('Record saved ✓');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function clearForm() {
    ['device-name','mac','serial','switch-name','switch-port','vlan','notes']
      .forEach(id => document.getElementById(id).value = '');
  }

  function deleteRecord(id) {
    if (!confirm('Delete this record?')) return;
    records = records.filter(r => r.id !== id);
    localStorage.setItem('device-tracker-records', JSON.stringify(records));
    renderRecords();
  }

  function renderRecords() {
    const list = document.getElementById('records-list');
    document.getElementById('rec-count').textContent =
      `${records.length} record${records.length !== 1 ? 's' : ''}`;
    if (records.length === 0) {
      list.innerHTML = '<div class="empty">No records yet.<br>Save your first entry above.</div>';
      return;
    }
    list.innerHTML = records.map(r => `
      <div class="record-card">
        <button class="delete-btn" onclick="deleteRecord(${r.id})">✕</button>
        <div class="record-header">
          <span class="record-device">${r.deviceName || '—'}</span>
        </div>
        <span class="record-time">${r.timestamp}</span>
        <div class="record-grid">
          ${r.mac ? `<div class="record-item"><div class="lbl">MAC</div><div class="val">${r.mac}</div></div>` : ''}
          ${r.serial ? `<div class="record-item"><div class="lbl">Serial</div><div class="val">${r.serial}</div></div>` : ''}
          ${r.switchName ? `<div class="record-item"><div class="lbl">Switch</div><div class="val">${r.switchName}</div></div>` : ''}
          ${r.switchPort ? `<div class="record-item"><div class="lbl">Port</div><div class="val">${r.switchPort}</div></div>` : ''}
          ${r.vlan ? `<div class="record-item"><div class="lbl">VLAN</div><div class="val">${r.vlan}</div></div>` : ''}
        </div>
        ${r.notes ? `<div class="record-notes"><span class="lbl">Close Out Notes</span>${r.notes}</div>` : ''}
      </div>
    `).join('');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function exportCSV() {
    if (records.length === 0) return;
    const headers = ['Device Name','MAC','Serial','Switch Name','Switch Port','VLAN','Notes','Timestamp'];
    const rows = records.map(r => [
      r.deviceName, r.mac, r.serial, r.switchName, r.switchPort, r.vlan,
      `"${(r.notes||'').replace(/"/g,'""')}"`, r.timestamp
    ].join(','));
    const csv = [headers.join(','), ...rows].join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv,' + encodeURIComponent(csv);
    a.download = `device-tracker-${Date.now()}.csv`;
    a.click();
  }

  // ── Scanner ──
  function openScanner(field) {
    scanTarget = field;
    lastResult = '';
    resultCooldown = false;
    const labels = { mac: 'Scanning MAC Address', serial: 'Scanning Serial Number' };
    document.getElementById('scanner-title').textContent = labels[field] || 'Scan Barcode';
    document.getElementById('scanner-status').textContent = 'Starting camera…';
    document.getElementById('scanner-err').textContent = '';
    document.getElementById('scanner-modal').classList.add('open');
    startQuagga();
  }

  function startQuagga() {
    if (scannerRunning) {
      Quagga.stop();
      scannerRunning = false;
    }

    Quagga.init({
      inputStream: {
        name: 'Live',
        type: 'LiveStream',
        target: document.getElementById('interactive'),
        constraints: {
          facingMode: 'environment',
          width: { ideal: 1280 },
          height: { ideal: 720 },
        },
        area: {
          top: '25%', right: '5%', left: '5%', bottom: '25%'
        },
      },
      locator: {
        patchSize: 'medium',
        halfSample: true,
      },
      numOfWorkers: 0, // Required for iOS — workers don't work in Safari
      frequency: 10,
      decoder: {
        readers: [
          'code_128_reader',
          'code_39_reader',
          'code_93_reader',
          'ean_reader',
          'ean_8_reader',
          'upc_reader',
          'codabar_reader',
          'i2of5_reader',
        ],
        multiple: false,
      },
      locate: true,
    }, function(err) {
      if (err) {
        console.error('Quagga init error:', err);
        let msg = 'Could not start camera.';
        if (err.name === 'NotAllowedError' || (err.message && err.message.includes('Permission'))) {
          msg = 'Camera permission denied. Please allow camera access in Safari Settings → Camera.';
        } else if (err.name === 'NotFoundError') {
          msg = 'No camera found.';
        } else {
          msg = 'Error: ' + (err.message || err.name || err);
        }
        document.getElementById('scanner-status').textContent = 'Camera error';
        document.getElementById('scanner-err').textContent = msg;
        return;
      }

      Quagga.start();
      scannerRunning = true;
      document.getElementById('scanner-status').textContent = 'Point camera at barcode';
    });

    Quagga.onDetected(function(result) {
      if (resultCooldown) return;
      const code = result && result.codeResult && result.codeResult.code;
      if (!code || code === lastResult) return;

      // Confidence check — only accept high-confidence reads
      const errors = result.codeResult.decodedCodes
        .filter(x => x.error !== undefined)
        .map(x => x.error);
      const avgError = errors.reduce((a, b) => a + b, 0) / (errors.length || 1);
      if (avgError > 0.25) return; // Too many errors, skip

      lastResult = code;
      resultCooldown = true;

      const cleaned = processBarcode(code);
      document.getElementById(scanTarget).value = cleaned;
      closeScanner();
      showToast('Scanned ✓');
    });
  }

  function processBarcode(raw) {
    let v = raw.trim();
    // Strip common label prefixes
    v = v.replace(/^(serial\s*no\.?|s\/n|sn|mac\s*addr(ess)?|mac)[:\s]+/i, '').trim();
    // Auto-format MAC address
    const hex = v.replace(/[:\-.\s]/g, '');
    if (/^[0-9a-f]{12}$/i.test(hex)) {
      return hex.toUpperCase().match(/.{2}/g).join(':');
    }
    return v;
  }

  function closeScanner() {
    document.getElementById('scanner-modal').classList.remove('open');
    if (scannerRunning) {
      try { Quagga.stop(); } catch(e) {}
      scannerRunning = false;
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeScanner(); });

  renderRecords();
</script>
</body>
</html>
